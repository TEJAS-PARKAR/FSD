<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <p class="eyebrow">Weekly Overview</p>
        <h1>Weather Dashboard</h1>
        <p class="subtitle">Track weekly temperature, humidity, and wind patterns for major cities.</p>
      </div>

      <label class="selector">
        <span>City</span>
        <select id="city-select">
          <option value="newYork">New York</option>
          <option value="london">London</option>
          <option value="tokyo">Tokyo</option>
          <option value="sydney">Sydney</option>
        </select>
      </label>
    </header>

    <main>
      <div class="stats">
        <div class="stat">
          <span>Temp</span>
          <strong id="avg-temp">--&deg;C</strong>
        </div>
        <div class="stat">
          <span>Humidity</span>
          <strong id="avg-humidity">--%</strong>
        </div>
        <div class="stat">
          <span>Wind</span>
          <strong id="avg-wind">-- km/h</strong>
        </div>
      </div>

      <div class="chart-grid">
        <section class="chart-card">
          <div class="chart-copy">
            <h2>Temperature Trend</h2>
            <p>Daily temperature changes across the week.</p>
          </div>
          <div class="chart-area">
            <canvas id="temperatureChart"></canvas>
          </div>
        </section>

        <section class="chart-card">
          <div class="chart-copy">
            <h2>Humidity and Wind</h2>
            <p>Compare moisture levels with average wind speed.</p>
          </div>
          <div class="chart-area">
            <canvas id="climateChart"></canvas>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
