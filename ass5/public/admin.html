<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Add Package - Wanderlust Travels</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
  <div class="container">
    <div class="logo">✈️ Wanderlust Travels</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="packages.html">Packages</a></li>
      <li><a href="bookings.html">My Bookings</a></li>
    </ul>
  </div>
</nav>

<!-- Admin Panel -->
<div class="container page-container">
  <h1>Admin - Add New Package</h1>
  
  <div class="admin-form">
    <form id="addPackageForm">
      <div class="form-group">
        <label for="name">Package Name *</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="destination">Destination *</label>
        <input type="text" id="destination" name="destination" placeholder="e.g., Paris, France" required>
      </div>

      <div class="form-group">
        <label for="duration">Duration</label>
        <input type="text" id="duration" name="duration" placeholder="e.g., 5 Days" value="3 Days">
      </div>

      <div class="form-group">
        <label for="price">Price per Person ($) *</label>
        <input type="number" id="price" name="price" min="0" step="0.01" required>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4" placeholder="Describe the package..."></textarea>
      </div>

      <div class="form-group">
        <label for="image">Image URL</label>
        <input type="url" id="image" name="image" placeholder="https://example.com/image.jpg">
      </div>

      <button type="submit" class="btn" style="width: 100%;">Add Package</button>
    </form>

    <div id="successMessage" class="success-message" style="display: none; margin-top: 20px;">
      ✓ Package added successfully! <a href="packages.html">View all packages</a>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <p>&copy; 2026 Wanderlust Travels. All rights reserved.</p>
</footer>

<script>
  document.getElementById('addPackageForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const pkg = {
      name: document.getElementById('name').value,
      destination: document.getElementById('destination').value,
      duration: document.getElementById('duration').value,
      price: parseFloat(document.getElementById('price').value),
      description: document.getElementById('description').value,
      image: document.getElementById('image').value
    };

    try {
      const response = await fetch('/api/packages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(pkg)
      });

      if (response.ok) {
        document.getElementById('addPackageForm').style.display = 'none';
        document.getElementById('successMessage').style.display = 'block';
        setTimeout(() => {
          window.location.href = 'packages.html';
        }, 2000);
      } else {
        alert('Failed to add package. Please check your input.');
      }
    } catch (error) {
      console.error('Error:', error);
      alert('An error occurred. Please try again.');
    }
  });
</script>

</body>
</html>
